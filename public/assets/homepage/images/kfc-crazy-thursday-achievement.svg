<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 888 448" role="img" aria-labelledby="title desc">
  <title id="title">KFC Crazy Thursday achievement poster</title>
  <desc id="desc">A playful award poster for KFC Crazy Thursday with a V ME 50 badge.</desc>
  <defs>
    <pattern id="stripe" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="18" fill="#2b2c33"/>
    </pattern>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="888" height="448" fill="#fff"/>
  <rect x="26" y="26" width="836" height="396" fill="none" stroke="#2b2c33" stroke-width="10"/>
  <rect x="54" y="54" width="780" height="340" fill="#fff" stroke="#2b2c33" stroke-width="3"/>
  <rect x="54" y="54" width="124" height="340" fill="#e4002b"/>
  <rect x="86" y="54" width="28" height="340" fill="#fff"/>
  <rect x="118" y="54" width="28" height="340" fill="#fff"/>
  <rect x="708" y="54" width="126" height="340" fill="url(#stripe)" opacity=".12"/>
  <g fill="#2b2c33" font-family="Arial Black, Impact, Helvetica, sans-serif">
    <text x="220" y="116" font-size="34" letter-spacing="2">KFC CRAZY THURSDAY</text>
    <text x="220" y="192" font-size="72">疯狂星期四</text>
    <text x="222" y="244" font-size="26" letter-spacing="1">ACHIEVEMENT UNLOCKED</text>
    <text x="222" y="318" font-size="40">V ME 50 HALL OF FAME</text>
  </g>
  <g transform="translate(604 112)">
    <circle cx="86" cy="86" r="82" fill="#e4002b"/>
    <circle cx="86" cy="86" r="65" fill="#fff"/>
    <circle cx="86" cy="86" r="52" fill="#2b2c33"/>
    <text x="86" y="77" fill="#fff" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="34" text-anchor="middle">V ME</text>
    <text x="86" y="118" fill="#fff" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="46" text-anchor="middle">50</text>
  </g>
  <g fill="#2b2c33" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    <text x="222" y="360">Lifetime Contribution to Fried Chicken Copywriting</text>
    <text x="222" y="386">Certified by the Thursday Committee</text>
  </g>
  <g transform="translate(79 148)" fill="#2b2c33">
    <rect x="0" y="122" width="74" height="22" rx="2"/>
    <path d="M8 0h58l-7 124H15z" fill="#fff" stroke="#2b2c33" stroke-width="8" stroke-linejoin="round"/>
    <path d="M16 21h42l-5 75H21z" fill="#e4002b"/>
    <text x="37" y="63" fill="#fff" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="24" text-anchor="middle">KFC</text>
  </g>
  <rect width="888" height="448" fill="transparent" filter="url(#paper)"/>
</svg>
