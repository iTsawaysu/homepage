  <rect x="1198" y="326" width="268" height="116" fill="#fff7ed" stroke="#0f172a" stroke-width="8"/>
  <text x="1240" y="394" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">AI PANEL</text>
  <rect x="1228" y="512" width="238" height="90" fill="#0f172a"/>
  <rect x="1262" y="548" width="142" height="12" fill="#fff7ed"/>
