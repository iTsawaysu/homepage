<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kaku coding project cover</title>
  <desc id="desc">A polished terminal interface for AI coding, panes, command suggestions, and fast defaults.</desc>
  <defs>
    <pattern id="scan" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M0 44H44" stroke="#253044" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#0a0f1a"/>
  <rect width="1600" height="900" fill="url(#scan)" opacity=".5"/>
  <path d="M0 0h1600v170H0z" fill="#111827"/>
  <path d="M0 638l420-168 282 430H0z" fill="#f97316"/>
  <path d="M1172 0h428v900h-292l-184-456z" fill="#22c55e"/>
  <text x="116" y="110" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="8" fill="#fff7ed">KAKU TERMINAL</text>
  <rect x="118" y="218" width="1030" height="520" fill="#0f172a" stroke="#fff7ed" stroke-width="9" filter="url(#shadow)"/>
  <rect x="118" y="218" width="1030" height="72" fill="#fff7ed"/>
  <circle cx="170" cy="254" r="11" fill="#f97316"/>
  <circle cx="210" cy="254" r="11" fill="#22c55e"/>
  <circle cx="250" cy="254" r="11" fill="#6366f1"/>
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="30" font-weight="700">
    <text x="168" y="360" fill="#22c55e">$</text>
    <text x="216" y="360" fill="#fff7ed">kaku ai</text>
    <text x="168" y="430" fill="#6366f1">#</text>
    <text x="216" y="430" fill="#fff7ed">explain failing build</text>
    <text x="168" y="500" fill="#f97316">→</text>
    <text x="216" y="500" fill="#fff7ed">suggest fix, review, apply</text>
  </g>
  <path d="M118 552h1030" stroke="#334155" stroke-width="5"/>
  <path d="M686 290v448" stroke="#334155" stroke-width="5"/>
  <rect x="730" y="342" width="354" height="90" fill="#172033"/>
  <rect x="762" y="378" width="166" height="14" fill="#fff7ed"/>
  <rect x="762" y="408" width="116" height="10" fill="#fff7ed" opacity=".58"/>
  <rect x="730" y="494" width="354" height="150" fill="#fff7ed"/>
