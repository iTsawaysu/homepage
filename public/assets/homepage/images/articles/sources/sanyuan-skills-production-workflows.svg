<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
<title id="title">Sanyuan Production Skills</title>
<desc id="desc">A production command topology for six focused skills</desc>
<style>
  .bg{fill:#0d1713}.panel{fill:#13231e;stroke:#9af7c5;stroke-width:3}.ink{fill:#e9fff3}.green{fill:#35e68a}.blue{fill:#6ad7ff}.amber{fill:#ffcf5a}.muted{fill:#8fb6a1}.line{stroke:#9af7c5;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#8fb6a1;stroke-width:2;stroke-linecap:round;opacity:.65}.title{font:900 32px Arial,sans-serif;fill:#e9fff3}.small{font:14px Arial,sans-serif;fill:#8fb6a1}.mono{font:700 13px monospace;fill:#e9fff3}.cmd{font:800 15px monospace;fill:#0d1713}
</style>
<rect class="bg" width="900" height="360"/>
<path d="M42 70h816M42 316h816" class="thin"/>
<text x="52" y="52" class="title">skill ops console</text>
<rect x="58" y="92" width="324" height="190" rx="18" class="panel"/>
<rect x="58" y="92" width="324" height="40" rx="18" fill="#9af7c5"/>
<circle cx="86" cy="112" r="6" fill="#0d1713"/><circle cx="108" cy="112" r="6" fill="#0d1713"/><circle cx="130" cy="112" r="6" fill="#0d1713"/>
<text x="84" y="164" class="mono">$ npx skills add</text>
<text x="84" y="195" class="mono">--repo sanyuan0704</text>
<text x="84" y="226" class="mono">--mode production</text>
<path d="M84 250h218" class="thin"/>
<text x="84" y="270" class="small">review, teach, audit, create, ingest, read</text>
<circle cx="592" cy="188" r="62" fill="#9af7c5" opacity=".15"/>
<circle cx="592" cy="188" r="42" fill="#13231e" stroke="#9af7c5" stroke-width="4"/>
<text x="563" y="194" class="mono">SKILLS</text>
<path d="M592 146V96M592 230v50M550 188h-76M634 188h74M562 158l-54-44M622 158l54-44M562 218l-54 44M622 218l54 44" class="line"/>
<rect x="526" y="72" width="132" height="36" rx="18" class="green"/><text x="544" y="95" class="cmd">/review</text>
<rect x="526" y="268" width="132" height="36" rx="18" class="amber"/><text x="544" y="291" class="cmd">/forge</text>
<rect x="400" y="170" width="132" height="36" rx="18" class="blue"/><text x="420" y="193" class="cmd">/sigma</text>
<rect x="654" y="170" width="132" height="36" rx="18" class="green"/><text x="672" y="193" class="cmd">/ingest</text>
<rect x="430" y="94" width="132" height="36" rx="18" class="amber"/><text x="446" y="117" class="cmd">/skill</text>
<rect x="654" y="94" width="132" height="36" rx="18" class="blue"/><text x="672" y="117" class="cmd">/book</text>
<text x="52" y="336" class="small">six commands orbit one production workflow instead of a flat menu</text>
